<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NetSuite Shortcuts</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="popup">
      <h1>Shortcuts Menu</h1>
      <p class="description">
        Quick links appear below the Navigation Centre menu on NetSuite pages.
      </p>

      <label class="toggle-row">
        <input id="enabled" type="checkbox" />
        <span>Enabled</span>
      </label>

      <div class="actions">
        <button id="open-options" type="button" class="btn btn-primary">
          Manage shortcuts
        </button>
      </div>
    </main>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
